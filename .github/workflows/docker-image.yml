name: Docker Image CI/CD

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    # 1. Log into Docker Hub using the secrets you created
    # This prevents rate-limiting and allows you to push images
    - name: Log in to Docker Hub
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKERHUB_USERNAME }}
        password: ${{ secrets.DOCKERHUB_TOKEN }}

    # 2. Extract metadata (tags, labels) for Docker
    # This automatically handles generating semantic tags (like 'latest' or 'main')
    - name: Extract Docker metadata
      id: meta
      uses: docker/metadata-action@v5
      with:
        images: ${{ secrets.DOCKERHUB_USERNAME }}/mediraksha-web
        tags: |
          type=raw,value=latest
          type=sha,format=short

    # 3. Build and Push the image to Docker Hub
    - name: Build and push Docker image
      uses: docker/build-push-action@v6
      with:
        context: .
        file: ./Dockerfile
        push: true
        tags: ${{ id.meta.outputs.tags }}
        labels: ${{ id.meta.outputs.labels }}
